name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

  e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-vet
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: E2E tests
        run: go test ./tests/e2e/ -v -count=1
        timeout-minutes: 15
